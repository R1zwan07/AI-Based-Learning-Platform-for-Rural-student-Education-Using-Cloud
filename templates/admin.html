<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="text-primary">Admin Panel - Welcome, {{ user_name }}!</h1>
            <a href="{{ url_for('logout') }}" class="btn btn-danger">Logout</a>
        </div>

        <a href="{{ url_for('view_feedback') }}">
    <button style="background-color:#17a2b8; color:white; border:none; padding:10px 20px; border-radius:6px; cursor:pointer;">
        View Feedback
    </button>
</a>

        <!-- Add Faculty Form -->
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Add New Faculty</h5>
            </div>
            <div class="card-body">
                <form action="{{ url_for('add_faculty') }}" method="post">
                    <div class="mb-3">
                        <label for="name" class="form-label">Faculty Name:</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Faculty Email:</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Faculty Password:</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-success">Add Faculty</button>
                </form>
            </div>
        </div>

        <!-- Manage Faculties Table -->
        <div class="card shadow-sm">
            <div class="card-header bg-secondary text-white">
                <h5 class="mb-0">View and Manage Faculties</h5>
            </div>
            <div class="card-body">
                {% if faculties %}
                    <div class="table-responsive">
                        <table class="table table-bordered table-striped align-middle">
                            <thead class="table-dark">
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for faculty in faculties %}
                                <tr>
                                    <td>{{ faculty.id }}</td>
                                    <td>{{ faculty.name }}</td>
                                    <td>{{ faculty.email }}</td>
                                    <td>
                                        <form action="{{ url_for('update_faculty', faculty_id=faculty.id) }}" method="post" class="d-inline">
                                            <div class="d-flex flex-column flex-md-row gap-2">
                                                <input type="text" class="form-control" name="new_name" value="{{ faculty.name }}" required>
                                                <input type="email" class="form-control" name="new_email" value="{{ faculty.email }}" required>
                                                <button type="submit" class="btn btn-primary btn-sm">Update</button>
                                            </div>
                                        </form>
                                        <form action="{{ url_for('delete_faculty', faculty_id=faculty.id) }}" method="post" class="d-inline mt-2 mt-md-0">
                                            <button type="submit" class="btn btn-danger btn-sm"
                                                onclick="return confirm('Are you sure you want to delete this faculty?')">Delete</button>
                                        </form>
                                    </td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                {% else %}
                    <p class="text-muted">No faculties added yet.</p>
                {% endif %}
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle CDN (Optional for modal/JS features) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Prevent back navigation
    history.pushState(null, null, location.href);
    window.onpopstate = function () {
        history.go(1);
    };
</script>
</body>
</html>
