<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Login / Register{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');

    /* 1. Reset background to remove the gradient and set height */
    body {
        font-family: 'Inter', sans-serif;
        background: none; /* Remove the old linear gradient background */
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0; /* Important: removes default margin */
        padding: 0; /* Important: removes default padding */
    }

    html {
        height: 100%; /* Ensure the html element spans the full viewport height */
    }

    /* 2. ADD/MODIFY BACKGROUND IMAGE STYLES */
    body {
        /* Use Jinja2's url_for for the correct path in a Flask app */
        background-image: url("{{ url_for('static', filename='img/bg.jpg') }}");
        background-repeat: no-repeat;
        background-attachment: fixed; /* Keeps the background static on scroll */
        background-size: cover;       /* Ensures the image covers the entire body */
        background-position: center;  /* Centers the image */
    }
    /* ... (rest of your existing styles like .flex-container, .main-content, etc.) ... */
</style>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;

            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- NEW STYLES FOR LAYOUT --- */
        .flex-container {
            display: flex;
            /* Maximum width of the entire card (Image + Login Form) */
            max-width: 900px;
            width: 90%;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden; /* Ensures image and form respects border-radius */
            background-color: white; /* Base background */
        }

        .image-side {
            /* Takes up 40% of the container width */
            flex: 0 0 40%;
            background-color: #f1f5f9; /* Light background for the image side */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .image-side img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            /* Image to blend with the learning theme, e.g., a person studying */
        }

        .main-content {
            /* Takes up 60% of the container width */
            flex: 1;
            padding: 3rem 2.5rem; /* Increased padding for more space */
            max-width: none; /* Override original max-width */
            box-shadow: none; /* Remove redundant box-shadow */
        }

        /* Hide the image on smaller screens */
        @media (max-width: 768px) {
            .image-side {
                display: none;
            }
            .main-content {
                width: 100%;
                max-width: 450px; /* Restore max-width for single column view */
            }
            .flex-container {
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1); /* Add shadow back to main content for mobile */
            }
        }
        /* --- END NEW STYLES --- */

        /* Existing Styles (modified/kept as is) */
        .alert {
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            border-radius: 0.5rem;
            font-weight: 500;
        }
        .alert-danger {
            background-color: #fee2e2;
            color: #b91c1c;
        }
        .alert-success {
            background-color: #d1fae5;
            color: #065f46;
        }
        input, select {
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #d1d5db;
            width: 100%;
            transition: all 0.2s ease;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #6190e8;
            box-shadow: 0 0 0 2px rgba(97, 144, 232, 0.25);
        }
        button {
            padding: 0.75rem;
            width: 100%;
            font-weight: 600;
            background-color: #6190e8;
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        button:hover {
            background-color: #4a7ae8;
        }
        .toggle-form-link {
            text-align: center;
            margin-top: 1rem;
            color: #6b7280;
            font-size: 0.875rem;
        }
        .toggle-form-link a {
            color: #6190e8;
            text-decoration: none;
            font-weight: 500;
        }
        .toggle-form-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="flex-container">

        <div class="image-side">
            <img src="{{ url_for('static', filename='img/loginimage.jpg') }}" alt="Illustration of person learning online">
        </div>

        <div class="main-content">
            <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">AI-Based Learning Platform for Rural Student Education Using Cloud</h1>

            {% if error %}
                <p class="alert alert-danger">{{ error }}</p>
            {% endif %}
            {% if success %}
                <p class="alert alert-success">{{ success }}</p>
            {% endif %}

            <h2 class="text-xl font-semibold text-center text-gray-700 mb-6">
                {% if user_type == 'Register Student' %}Student Registration{% else %}Login{% endif %}
            </h2>

            <div id="login-container" {% if user_type == 'Register Student' %}style="display:none;"{% endif %}>
                <form action="{{ url_for('login') }}" method="post" class="space-y-4">
                    <input type="hidden" name="user_type" id="loginUserType" value="{{ user_type or 'Student' }}">
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <div>
                        <label for="user_type_select" class="block text-sm font-medium text-gray-700 mb-1">User Type</label>
                        <select name="user_type" id="user_type_select" onChange="document.getElementById('loginUserType').value = this.value">
                            <option value="no_selection" {% if user_type =="no_selection" %}selected{% endif %}>Select User Type</option>
                            <option value="Admin" {% if user_type =="Admin" %}selected{% endif %}>Admin</option>
                            <option value="Faculty" {% if user_type =="Faculty" %}selected{% endif %}>Faculty</option>
                            <option value="Student" {% if user_type =="Student" %}selected{% endif %}>Student</option>
                        </select>
                    </div>
                    <button type="submit">Login</button>
                </form>
                <p class="toggle-form-link">
                    <a href="#" onClick="toggleForms()">Register as a Student</a>
                </p>
            </div>

            <div id="register-container" {% if user_type != 'Register Student' %}style="display:none;"{% endif %}>
                <form action="{{ url_for('register') }}" method="post" class="space-y-4">
                    <div>
                        <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                        <input type="text" id="name" name="name" pattern="[a-zA-Z][a-zA-Z ]{2,}"  title="Name should not contain any other symbols except alphabet " required>
                    </div>
                    <div>
                        <label for="reg_email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input type="email" id="reg_email" name="email" required>
                    </div>
                    <div>
                        <label for="s_class" class="block text-sm font-medium text-gray-700 mb-1">Class</label>
                        <input type="text" id="s_class" name="s_class" pattern="[0-9]{2}" title=" 2 digit  number is required "  required required>
                    </div>
                    <div>
                        <label for="reg_password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" id="reg_password" name="password" required>
                    </div>
                    <div>
                        <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                        <input type="password" id="confirm_password" name="confirm_password" required>
                    </div>
                    <button type="submit">Register</button>
                </form>
                <p class="toggle-form-link">
                    <a href="#" onClick="toggleForms()">Go to Login</a>
                </p>
            </div>
        </div>
    </div>

<script>
    function toggleForms() {
        var loginContainer = document.getElementById('login-container');
        var registerContainer = document.getElementById('register-container');
        var loginUserType = document.getElementById('loginUserType');
        var userTypeSelect = document.getElementById('user_type_select');
        var heading = document.querySelector('h2');

        if (loginContainer.style.display === 'none') {
            loginContainer.style.display = 'block';
            registerContainer.style.display = 'none';
            loginUserType.value = userTypeSelect.value;
            heading.textContent = 'Login';
        } else {
            loginContainer.style.display = 'none';
            registerContainer.style.display = 'block';
            loginUserType.value = 'Register Student';
            heading.textContent = 'Student Registration';
        }
    }
</script>
</body>
</html>
