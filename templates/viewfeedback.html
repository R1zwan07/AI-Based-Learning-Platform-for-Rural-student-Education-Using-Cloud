<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Feedback</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #e3f2fd, #f1f8e9);
            color: #333;
            margin: 0;
            padding: 20px;
        }

        header {
            background-color: #007bff;
            color: white;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        h2 {
            color: #2c3e50;
            text-align: center;
        }

        table {
            width: 90%;
            margin: 0 auto;
            border-collapse: collapse;
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background-color: #343a40;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        .back-link {
            display: inline-block;
            margin: 20px auto;
            text-decoration: none;
            color: white;
            background-color: #28a745;
            padding: 10px 18px;
            border-radius: 6px;
            font-weight: bold;
        }

        .back-link:hover {
            background-color: #218838;
        }

        .no-feedback {
            text-align: center;
            font-size: 18px;
            color: #c0392b;
        }
    </style>
</head>
<body>

<header>
    <h1>All User Feedback</h1>
</header>

{% if feedbacks %}
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>User Name</th>
                <th>Feedback</th>
                <th>Submitted At</th>
            </tr>
        </thead>
        <tbody>
            {% for fb in feedbacks %}
            <tr>
                <td>{{ fb.id }}</td>
                <td>{{ fb.name }}</td>
                <td>{{ fb.feedback }}</td>
                <td>{{ fb.submitted_at }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% else %}
    <p class="no-feedback">No feedback has been submitted yet.</p>
{% endif %}

<div style="text-align:center;">
    <a href="{{ url_for('admin_dashboard') }}" class="back-link">← Back to Dashboard</a>
</div>

</body>
</html>
