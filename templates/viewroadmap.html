<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>View Class Roadmaps</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #f8f9fa, #e3f2fd);
      text-align: center;
      padding: 30px;
    }
    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 70%;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }
    th {
      background: #007bff;
      color: white;
    }
    a {
      text-decoration: none;
      color: #007bff;
    }
    a:hover {
      text-decoration: underline;
    }
    .back-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #6a1b9a;
      color: white;
      border-radius: 5px;
      text-decoration: none;
    }
  </style>
  <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
             background-image: url("{{ url_for('static', filename='img/bg.jpg') }}");
            color: #333;
            padding: 20px;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
	        background-position: center;
        }

        header {
            background-color: #6a1b9a;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 30px;
            position: relative;
        }

        .logout-link {
            position: absolute;
            right: 30px;
            top: 20px;
            background-color: #d32f2f;
            color: white;
            padding: 8px 14px;
            text-decoration: none;
            border-radius: 5px;
        }

        .logout-link:hover {
            background-color: #b71c1c;
        }

        h2 {
            text-align: center;
            color: #4a148c;
        }

        form {
            text-align: center;
            margin-bottom: 40px;
        }

        select {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #aaa;
            width: 250px;
            font-size: 16px;
        }

        .material-card {
            background-color: white;
            padding: 20px;
            margin: 20px auto;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 800px;
        }

        .material-card h3 {
            margin-top: 0;
            color: #2e7d32;
        }

        .material-card p {
            line-height: 1.6;
        }

        .material-card a {
            display: inline-block;
            background-color: #0288d1;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            text-decoration: none;
            margin-top: 10px;
        }

        .material-card a:hover {
            background-color: #0277bd;
        }

        video, iframe {
            width: 100%;
            max-width: 100%;
            border-radius: 6px;
            margin-top: 15px;
        }

        .no-materials {
            text-align: center;
            color: #c62828;
            font-weight: bold;
        }

        hr {
            border: none;
            height: 2px;
            background: #ccc;
            margin: 30px 0;
        }
    </style>
    <style>
	#myFixedButton {
    position: fixed; /* Makes the button fixed relative to the viewport */
    bottom: 20px;    /* Positions the button 20px from the bottom of the viewport */
    right: 20px;     /* Positions the button 20px from the right of the viewport */
    z-index: 1000;   /* Ensures the button stays on top of other content */
    padding: 15px 25px; /* Adds some padding for better appearance */
    background-color: #007bff; /* Example background color */
    color: white;    /* Example text color */
    border: none;    /* Removes default button border */
    border-radius: 5px; /* Adds rounded corners */
    cursor: pointer; /* Changes cursor to pointer on hover */
    font-size: 16px; /* Sets font size */
}

#myFixedButton:hover {
    background-color: #0056b3; /* Darker background on hover */
}
	</style>
</head>
<body>
    <header>
        <h1>Student Panel - Welcome {{ user_name }}!</h1>

        <a class="logout-link" href="{{ url_for('logout') }}">Logout</a>
    </header>
<div align="left" style="margin: 20px;">
    <a href="{{ url_for('chatbot') }}">
        <button  style="padding:10px 20px; margin-right:10px;">Chatbot</button>
    </a>
    <a href="{{ url_for('quiz') }}">
        <button style="padding:10px 20px;">Quiz</button>
    </a>
    <a href="{{ url_for('feedback') }}">
        <button style="padding:10px 20px;">Feedback</button>
    </a>
<a href="{{ url_for('view_roadmap') }}">
    <button style="padding:10px 20px;">Roadmap</button>
</a>


</div>
  <h2>📚 Class Roadmaps</h2>

  {% if roadmaps %}
  <table>
    <tr>
      <th>ID</th>
      <th>Class</th>
      <th>File Name</th>
      <th>View</th>
    </tr>
    {% for r in roadmaps %}
    <tr>
      <td>{{ r.id }}</td>
      <td>{{ r.std_class }}</td>
      <td>{{ r.pdf_name }}</td>
      <td><a href="{{ url_for('serve_pdf', filename=r.pdf_name) }}" target="_blank">📄 Open PDF</a></td>
    </tr>
    {% endfor %}
  </table>
  {% else %}
    <p>No roadmap files uploaded yet.</p>
  {% endif %}

  <a class="back-btn" href="{{ url_for('student_dashboard') }}">⬅ Back to Dashboard</a>

</body>
</html>
